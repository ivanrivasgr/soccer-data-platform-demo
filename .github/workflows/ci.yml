name: Soccer Data Pipeline CI

on:
  push:
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas pyarrow pytest

      - name: Generate synthetic data
        run: |
          python src/generate_sample_data.py

      - name: Detect generated dataset
        run: |
          echo "Detecting CSV dataset..."
          DATA_FILE=$(ls data/raw/*.csv | head -n 1)
          echo "DATA_FILE=$DATA_FILE" >> $GITHUB_ENV

      - name: Run validation
        run: |
          python src/validate.py $DATA_FILE

      - name: Run transformation
        run: |
          python src/transform.py $DATA_FILE

      - name: Build analytics table
        run: |
          python src/build_analytics.py $DATA_FILE

      - name: Run tests
        run: |
          PYTHONPATH=. pytest -v

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analytics_output
          path: |
            data/analytics/player_session_metrics.csv
            monitoring/quality_report.json